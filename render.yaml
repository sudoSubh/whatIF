# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect this repo at https://dashboard.render.com/blueprints, then fill in
# the env vars marked `sync: false` in the Render dashboard (Render won't
# read secret values from this file for security reasons).

services:
  - type: web
    name: whatif-api
    runtime: node
    plan: free
    region: oregon          # change to match your Supabase project region
    rootDir: server
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # -----------------------------------------------------------------------
      # Static / non-secret values — committed here, safe to be public
      # -----------------------------------------------------------------------
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 15m
      # PORT is set automatically by Render — do not override it here

      # -----------------------------------------------------------------------
      # Database — Supabase Postgres
      # -----------------------------------------------------------------------
      - key: SUPABASE_URL
        sync: false         # e.g. https://rclfqldxilejcaxpsoqz.supabase.co
      - key: SUPABASE_DB_PASSWORD
        sync: false         # Project Settings → Database → password
      - key: SUPABASE_REGION
        sync: false         # optional: e.g. ap-south-1 | us-east-1 | eu-west-1

      # -----------------------------------------------------------------------
      # Supabase API keys (optional, for REST/Auth features)
      # -----------------------------------------------------------------------
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_JWKS_URL
        sync: false

      # -----------------------------------------------------------------------
      # Database Connection URLs (REQUIRED by Prisma)
      # Both DATABASE_URL and DIRECT_URL must be set.
      # Use: postgresql://postgres:<PASSWORD>@db.<REF>.supabase.co:5432/postgres
      # Example: postgresql://postgres:IwSQ4GHzCCb1rEiB@db.rclfqldxilejcaxpsoqz.supabase.co:5432/postgres
      # -----------------------------------------------------------------------
      - key: DATABASE_URL
        sync: false         # Prisma runtime connection (direct or pooled)
      - key: DIRECT_URL
        sync: false         # Prisma migration connection (must be direct, port 5432)

      # -----------------------------------------------------------------------
      # JWT — token signing
      # -----------------------------------------------------------------------
      - key: JWT_SECRET
        sync: false         # >= 32 random chars

      # -----------------------------------------------------------------------
      # Gemini AI
      # -----------------------------------------------------------------------
      - key: GEMINI_API_KEY
        sync: false         # required in production
      - key: GEMINI_API_KEY_FALLBACK
        sync: false         # optional fallback key

      # -----------------------------------------------------------------------
      # CORS — your deployed Vercel/client URL (required in production)
      # -----------------------------------------------------------------------
      - key: FRONTEND_URL
        sync: false         # e.g. https://your-app.vercel.app
